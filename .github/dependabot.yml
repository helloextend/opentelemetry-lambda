# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "github-actions"
    directories:
      - "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directories:
      - "/collector"
      - "/collector/internal/tools"
      - "/collector/lambdacomponents"
      - "/collector/lambdalifecycle"
      - "/collector/processor/coldstartprocessor"
      - "/collector/processor/decoupleprocessor"
      - "/collector/receiver/telemetryapireceiver"
    schedule:
      interval: "weekly"
    groups:
      opentelemetry-deps-collector:
        patterns:
          - "*opentelemetry*"
      collector-other:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directories:
      - "/nodejs"
      - "/nodejs/packages/layer"
    registries:
      - codeartifact
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      internal:
        patterns:
          - "@extend/*"
          - "@helloextend/*"
          - "extend-cdk-lib"
      opentelemetry-deps-nodejs:
        patterns:
          - "@opentelemetry/*"
      nodejs-other:
        patterns:
          - "*"

  # - package-ecosystem: "pip"
  #   directories:
  #     - "/python/src/otel"
  #     - "/python/src/otel/otel_sdk"
  #     - "/python/src/otel/tests"
  #   schedule:
  #     interval: "weekly"
  #   groups:
  #     opentelemetry-deps-python:
  #       patterns:
  #         - "opentelemetry-*"
  #     python-other:
  #       patterns:
  #         - "*"

registries:
  codeartifact:
    type: npm-registry
    url: https://extend-159581800400.d.codeartifact.us-east-1.amazonaws.com/npm/extend-npm/
    token: ${{secrets.CODEARTIFACT_AUTH_TOKEN}}
    replaces-base: true
