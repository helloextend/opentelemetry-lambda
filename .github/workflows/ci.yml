name: CI

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  go-lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: collector/go.mod
          cache-dependency-path: collector/go.sum
      - run: make -C collector golint

  go-test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: collector/go.mod
          cache-dependency-path: collector/go.sum
      - run: make -C collector gotest

  go-vulncheck:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: collector/go.mod
          cache-dependency-path: collector/go.sum
      - run: make -C collector govulncheck

  nodejs-lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      OPENTELEMETRY_JS_CONTRIB_PATH: ${{ github.workspace }}/.build-cache/opentelemetry-js-contrib
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: coralogix/opentelemetry-js-contrib
          ref: 3a9691a699ddd06c3644eec70bf4b50cc4217ba3
          path: .build-cache/opentelemetry-js-contrib
      - uses: ./.github/actions/setup-node-pnpm
        with:
          codeartifact-auth-token: ${{ secrets.CODEARTIFACT_AUTH_TOKEN }}
          install: 'false'
      - run: ./scripts/build_nodejs_layer.sh
      - run: pnpm --filter "./nodejs/packages/*" run lint

  nodejs-test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      OPENTELEMETRY_JS_CONTRIB_PATH: ${{ github.workspace }}/.build-cache/opentelemetry-js-contrib
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: coralogix/opentelemetry-js-contrib
          ref: 3a9691a699ddd06c3644eec70bf4b50cc4217ba3
          path: .build-cache/opentelemetry-js-contrib
      - uses: ./.github/actions/setup-node-pnpm
        with:
          codeartifact-auth-token: ${{ secrets.CODEARTIFACT_AUTH_TOKEN }}
          install: 'false'
      - run: ./scripts/build_nodejs_layer.sh
      - run: pnpm --filter "./nodejs/packages/*" run test --if-present

  layer-build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      OPENTELEMETRY_JS_CONTRIB_PATH: ${{ github.workspace }}/.build-cache/opentelemetry-js-contrib
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: collector/go.mod
          cache-dependency-path: collector/go.sum
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: coralogix/opentelemetry-js-contrib
          ref: 3a9691a699ddd06c3644eec70bf4b50cc4217ba3
          path: .build-cache/opentelemetry-js-contrib
      - uses: ./.github/actions/setup-node-pnpm
        with:
          codeartifact-auth-token: ${{ secrets.CODEARTIFACT_AUTH_TOKEN }}
          install: 'false'
      - run: make -C collector package-extend GOARCH=amd64
      - run: ./scripts/build_nodejs_layer.sh
      - env:
          FILE_PATH: ./nodejs/packages/layer/build/layer.zip
          MAX_SIZE: 10485760
        run: ./scripts/check_size.sh
      - run: ./scripts/merge-layer-zips.sh collector/build/opentelemetry-collector-layer-amd64.zip nodejs/packages/layer/build/layer.zip merged-layer.zip
      - env:
          FILE_PATH: ./merged-layer.zip
          MAX_SIZE: 52428800
        run: ./scripts/check_size.sh
